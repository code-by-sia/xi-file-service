name: Build

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  xi-build:
    name: Build with Xi release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang

      - name: Download latest Xi release
        run: |
          set -euo pipefail
          release_json="$(curl -fsSL https://api.github.com/repos/code-by-sia/x/releases/latest)"
          xi_tag="$(printf '%s' "$release_json" | sed -n 's/.*"tag_name": *"\([^"]*\)".*/\1/p')"
          xi_asset="xi-${xi_tag}-linux-x86_64.tar.gz"
          xi_url="https://github.com/code-by-sia/x/releases/download/${xi_tag}/${xi_asset}"

          mkdir -p "$RUNNER_TEMP/xi"
          curl -fsSL "$xi_url" -o "$RUNNER_TEMP/$xi_asset"
          tar -xzf "$RUNNER_TEMP/$xi_asset" -C "$RUNNER_TEMP/xi" --strip-components=1

          echo "$RUNNER_TEMP/xi/bin" >> "$GITHUB_PATH"
          echo "XC_HOME=$RUNNER_TEMP/xi" >> "$GITHUB_ENV"
          echo "XC_STD=$RUNNER_TEMP/xi" >> "$GITHUB_ENV"
          echo "XC_RUNTIME=$RUNNER_TEMP/xi/runtime" >> "$GITHUB_ENV"

      - name: Verify Xi compiler
        run: |
          command -v xc
          test -d "$XC_STD"

      - name: Build
        run: xc src/app.xi

      - name: Run tests
        run: |
          xi test src/test/file-utils-test.xi
          xi test src/test/file-failure-store-test.xi
          xi test src/test/disk-file-service-test.xi
